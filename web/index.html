<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Aunty — free browser game. Dodge bamboo. Keep flying.">
  <meta name="theme-color" content="#F4F6F8">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aunty">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Aunty</title>
  <link rel="manifest" href="manifest.json">

  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" as="image" href="assets/assets/images/landing-preview.png">

  <!--
    CRITICAL: sync localStorage parse BEFORE first paint.
    Preloads offer/winner images so the shell never flashes grey for return visits.
  -->
  <script>
    (function () {
      var KEY = 'aunty_homepage_config_v1';
      var snap = null;
      try {
        var raw = localStorage.getItem(KEY);
        if (raw && raw.trim()) snap = JSON.parse(raw);
      } catch (e) { snap = null; }
      window.__AUNTY_HP = (snap && typeof snap === 'object') ? snap : null;

      function preloadImg(url) {
        if (!url) return;
        try {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = url;
          document.head.appendChild(link);
        } catch (e) {}
      }

      var d = window.__AUNTY_HP;
      if (!d) return;
      preloadImg(String(d.offer_image_url || d.offer_image || '').trim());
      preloadImg(String(d.winner_photo || d.photo || d.photo_url || '').trim());
    })();
  </script>

  <script>
    (function () {
      var ua = (navigator.userAgent || '').toLowerCase();
      var mobile = /android|iphone|ipad|ipod|mobile/.test(ua) ||
        (navigator.maxTouchPoints > 1 && /macintosh/.test(ua));
      if (mobile) document.documentElement.classList.add('mobile-web');
    })();
  </script>

  <style>
    :root {
      --surface: #F4F6F8;
      --ink: #121820;
      --muted: #5A6570;
      --cyan: #0E8FA8;
      --offer: #E85D04;
      --offer-deep: #C44900;
      --gold: #C9A227;
      --gold-deep: #8B6914;
      --line: rgba(10, 22, 32, 0.08);
      --card: #FFFFFF;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--surface);
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html:not(.is-playing),
    body:not(.is-playing) {
      overflow: hidden !important;
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    #flutter-host {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--surface);
      z-index: 1;
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    #flutter-host.is-ready {
      opacity: 1;
    }

    #flutter-host flutter-view,
    #flutter-host flt-glass-pane,
    #flutter-host flt-scene-host,
    #flutter-host canvas {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }

    html.mobile-web body:not(.is-playing) #flutter-host {
      touch-action: pan-y;
    }

    html.is-playing,
    body.is-playing {
      overflow: hidden !important;
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    body.is-playing #flutter-host {
      touch-action: none;
      opacity: 1 !important;
    }

    body.is-playing #landing-shell {
      display: none !important;
    }

    /*
     * Instant HTML landing shell — mirrors Flutter HomepagePromoPanel layout
     * so first paint ≤0.5s, independent of JS/Flame/Firestore boot.
     */
    #landing-shell {
      position: fixed;
      inset: 0;
      z-index: 20;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      box-sizing: border-box;
      padding: 10px 10px 24px;
      transition: opacity 160ms ease-out;
    }

    #landing-shell.is-hiding {
      opacity: 0;
      pointer-events: none;
    }

    #landing-shell .play-card {
      position: relative;
      width: 100%;
      height: 66vh;
      height: 66dvh;
      min-height: 240px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(10, 22, 32, 0.09);
      box-shadow: 0 8px 18px rgba(10, 22, 32, 0.09);
      background: #000 center / cover no-repeat;
      background-image: url('assets/assets/images/landing-preview.png');
    }

    #landing-shell .play-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    #landing-shell .play-cta {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
    }

    #landing-shell .play-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.9);
      color: #0A1218;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    #landing-shell .play-pill .dot {
      width: 14px;
      height: 14px;
      border: 2px solid #163846;
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    #landing-shell .highlights {
      margin-top: 8px;
      padding: 0 0 8px;
    }

    #landing-shell .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    #landing-shell .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(10, 22, 32, 0.04);
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    #landing-shell .card .accent {
      height: 3px;
      width: 100%;
      flex-shrink: 0;
    }

    #landing-shell .card.offer .accent { background: var(--offer); }
    #landing-shell .card.winner .accent { background: var(--gold); }

    #landing-shell .card .body {
      padding: 14px 14px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #landing-shell .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
      width: fit-content;
    }

    #landing-shell .badge.offer { background: var(--offer); }
    #landing-shell .badge.winner {
      background: var(--gold-deep);
      margin-left: auto;
      margin-right: auto;
    }

    /* Mirror Flutter HomepagePromoPanel typography exactly */
    #landing-shell .card.offer h3 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.2px;
      line-height: 1.2;
      color: var(--offer-deep);
    }

    #landing-shell .card.winner h3 {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.2px;
      line-height: 1.1;
      color: var(--gold-deep);
      text-align: center;
    }

    /* Offer media — 16:9 match Flutter AspectRatio */
    #landing-shell .offer-media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #FFF4EC;
      border: 1px solid rgba(232, 93, 4, 0.13);
    }

    #landing-shell .offer-media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #landing-shell .offer-media img.is-on {
      display: block;
    }

    #landing-shell .offer-media .media-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 1;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--offer);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
    }

    #landing-shell .offer-desc {
      margin: 12px 0 0;
      font-size: 13.5px;
      line-height: 1.4;
      font-weight: 500;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.4em;
    }

    #landing-shell .offer-price {
      margin: 10px 0 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.1px;
      color: var(--offer-deep);
    }

    /* Winner block */
    #landing-shell .winner-body {
      align-items: center;
      text-align: center;
    }

    /* Winner loading — gold ring + shimmer circle (matches Flutter _ShimmerCircle) */
    #landing-shell .winner-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2.5px solid var(--gold);
      box-shadow: 0 4px 14px rgba(201, 162, 39, 0.2);
      overflow: hidden;
      margin: 0 auto;
      position: relative;
      background: #FFF8E7;
    }

    #landing-shell .winner-avatar .skel.circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      margin: 0;
    }

    #landing-shell .winner-skels {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 12px;
    }

    #landing-shell .winner-skels .skel.line {
      margin-left: auto;
      margin-right: auto;
    }

    /* Shimmer placeholders (shown until cache / Flutter hydrates) */
    #landing-shell .skel {
      background: linear-gradient(90deg, #E8ECF0 0%, #F4F6F8 50%, #E8ECF0 100%);
      background-size: 200% 100%;
      animation: shimmer 1.1s ease-in-out infinite;
      border-radius: 8px;
    }

    #landing-shell .skel.line {
      height: 12px;
      margin-top: 10px;
      width: 78%;
    }

    #landing-shell .skel.line.short {
      width: 48%;
      margin-top: 8px;
    }

    #landing-shell .skel.fill {
      position: absolute;
      inset: 0;
      border-radius: 0;
    }

    #landing-shell .offer-media.has-url .skel.fill,
    #landing-shell .offer-media.is-ready .skel.fill,
    #landing-shell .card.offer.is-hydrated #shell-offer-skels,
    #landing-shell .card.winner.is-hydrated #shell-winner-skels,
    #landing-shell .card.winner.is-hydrated .winner-avatar .skel.circle {
      display: none !important;
    }

    #landing-shell .winner-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #landing-shell .winner-avatar img.is-on,
    #landing-shell .winner-avatar.has-photo img {
      display: block;
    }

    #landing-shell .winner-name {
      margin: 12px 0 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.2px;
      color: var(--ink);
      display: none;
    }

    #landing-shell .winner-name.is-on {
      display: block;
    }

    #landing-shell .winner-score {
      margin: 10px auto 0;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 22px;
      background: linear-gradient(90deg, #F5E6A8, #E8D078);
      border: 1px solid rgba(201, 162, 39, 0.33);
      color: var(--gold-deep);
      font-size: 13.5px;
      font-weight: 800;
    }

    #landing-shell .winner-score.is-on {
      display: inline-flex;
    }

    #landing-shell .offer-desc:empty {
      display: none;
    }

    #landing-shell .offer-price:empty {
      display: none;
    }

    #landing-shell .privacy {
      text-align: center;
      padding: 16px 12px 8px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      #landing-shell { padding: 8px 6px 20px; }
      #landing-shell .play-card {
        height: 62vh;
        height: 62dvh;
        border-radius: 16px;
      }
      #landing-shell .cards {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      #landing-shell .card { min-height: 0; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
  </style>

  <script>
    (function () {
      var PLAYER_KEY = 'aunty_stable_player_id';
      var TOTAL_KEY = 'aunty_cached_total_score';
      var OFFER_CACHE_KEY = 'aunty_homepage_config_v1';
      var COOKIE_DAYS = 400;

      function readCookie(name) {
        try {
          var parts = ('; ' + document.cookie).split(';');
          for (var i = 0; i < parts.length; i++) {
            var p = parts[i].trim();
            if (p.indexOf(name + '=') === 0) {
              return decodeURIComponent(p.substring(name.length + 1));
            }
          }
        } catch (e) {}
        return '';
      }

      function writeCookie(name, value) {
        try {
          var maxAge = COOKIE_DAYS * 24 * 60 * 60;
          document.cookie = name + '=' + encodeURIComponent(value) +
            ';path=/;max-age=' + maxAge + ';SameSite=Lax';
        } catch (e) {}
      }

      function lsGet(key) {
        try { return localStorage.getItem(key) || ''; } catch (e) { return ''; }
      }

      function lsSet(key, value) {
        try { localStorage.setItem(key, value); } catch (e) {}
      }

      window.__auntyStore = {
        getPlayerId: function () {
          var v = lsGet(PLAYER_KEY) || readCookie(PLAYER_KEY);
          if (v && !lsGet(PLAYER_KEY)) lsSet(PLAYER_KEY, v);
          return v;
        },
        setPlayerId: function (id) {
          if (!id) return;
          lsSet(PLAYER_KEY, id);
          writeCookie(PLAYER_KEY, id);
        },
        getTotal: function () {
          var v = lsGet(TOTAL_KEY) || readCookie(TOTAL_KEY);
          if (v && !lsGet(TOTAL_KEY)) lsSet(TOTAL_KEY, v);
          return v;
        },
        setTotal: function (n) {
          if (n === undefined || n === null || n === '') return;
          var s = String(n);
          lsSet(TOTAL_KEY, s);
          writeCookie(TOTAL_KEY, s);
        }
      };

      /**
       * Apply aunty_homepage_config_v1 into the HTML shell synchronously.
       * Must run immediately after shell DOM nodes exist (blocking script) —
       * never wait for DOMContentLoaded / Flutter.
       */
      function hydrateShellFromCache(data) {
        try {
          var d = data;
          if (!d || typeof d !== 'object') {
            try {
              var raw = lsGet(OFFER_CACHE_KEY);
              if (!raw) return false;
              d = JSON.parse(raw);
            } catch (e) { return false; }
          }
          if (!d || typeof d !== 'object') return false;

          var imgUrl = String(d.offer_image_url || d.offer_image || '').trim();
          var desc = String(d.offer_desc || '').trim();
          var price = String(d.offer_price || '').trim();
          var photo = String(d.winner_photo || d.photo || d.photo_url || '').trim();
          var name = String(d.winner_name || d.name || d.displayName || '').trim();
          var scoreRaw = d.winner_score != null ? d.winner_score : d.score;
          var score = parseInt(scoreRaw, 10);
          if (isNaN(score)) score = 0;

          var offerCard = document.getElementById('shell-offer-card');
          var media = document.getElementById('shell-offer-media');
          var img = document.getElementById('shell-offer-img');
          var descEl = document.getElementById('shell-offer-desc');
          var priceEl = document.getElementById('shell-offer-price');
          var skelLines = document.getElementById('shell-offer-skels');

          var winnerCard = document.getElementById('shell-winner-card');
          var avatar = document.getElementById('shell-winner-avatar');
          var winnerImg = document.getElementById('shell-winner-img');
          var nameEl = document.getElementById('shell-winner-name');
          var scoreEl = document.getElementById('shell-winner-score');
          var winnerSkels = document.getElementById('shell-winner-skels');

          var offerHit = !!(imgUrl || desc || price);
          var winnerHit = !!(photo || name || score > 0);

          if (imgUrl && img && media) {
            media.classList.add('has-url');
            // Paint URL as CSS background immediately (before decode).
            media.style.backgroundImage = 'url("' + imgUrl.replace(/"/g, '\\"') + '")';
            media.style.backgroundSize = 'cover';
            media.style.backgroundPosition = 'center';
            img.decoding = 'sync';
            img.fetchPriority = 'high';
            img.onload = function () {
              img.classList.add('is-on');
              media.classList.add('is-ready');
            };
            img.onerror = function () { /* keep bg / skel */ };
            if (img.src !== imgUrl) img.src = imgUrl;
            // If already cached by browser, onload may have fired — force visible.
            if (img.complete && img.naturalWidth > 0) {
              img.classList.add('is-on');
              media.classList.add('is-ready');
            }
          }

          if (desc && descEl) {
            descEl.textContent = desc;
            descEl.classList.add('is-ready');
          }
          if (price && priceEl) {
            priceEl.textContent = price;
            priceEl.classList.add('is-ready');
          }
          if (offerHit) {
            if (skelLines) skelLines.style.display = 'none';
            if (offerCard) offerCard.classList.add('is-hydrated');
          }

          if (photo && winnerImg && avatar) {
            avatar.style.backgroundImage = 'url("' + photo.replace(/"/g, '\\"') + '")';
            avatar.style.backgroundSize = 'cover';
            avatar.style.backgroundPosition = 'center';
            winnerImg.decoding = 'sync';
            winnerImg.fetchPriority = 'high';
            winnerImg.onload = function () {
              winnerImg.classList.add('is-on');
              avatar.classList.add('has-photo');
            };
            if (winnerImg.src !== photo) winnerImg.src = photo;
            if (winnerImg.complete && winnerImg.naturalWidth > 0) {
              winnerImg.classList.add('is-on');
              avatar.classList.add('has-photo');
            }
          }

          if (name && nameEl) {
            nameEl.textContent = name;
            nameEl.classList.add('is-on');
          }
          if (scoreEl && (score > 0 || name)) {
            scoreEl.textContent = score > 0 ? ('Score  ' + score) : 'Score  —';
            scoreEl.classList.add('is-on');
          }
          if (winnerHit) {
            if (winnerSkels) winnerSkels.style.display = 'none';
            if (winnerCard) winnerCard.classList.add('is-hydrated');
          }

          return offerHit || winnerHit;
        } catch (e) {
          return false;
        }
      }

      window.__auntyHydrateShell = hydrateShellFromCache;
    })();

    function hideLandingShell() {
      var el = document.getElementById('landing-shell');
      var host = document.getElementById('flutter-host');
      if (host) host.classList.add('is-ready');
      if (!el) return;
      el.classList.add('is-hiding');
      setTimeout(function () {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }, 180);
      var old = document.getElementById('loading');
      if (old && old.parentNode) old.parentNode.removeChild(old);
    }

    window.addEventListener('flutter-first-frame', function () {
      hideLandingShell();
      if (!document.body.classList.contains('is-playing')) {
        document.documentElement.classList.remove('is-playing');
        document.body.classList.remove('is-playing');
      }
    });

    // Failsafe if Flutter is very slow — never trap on the shell forever.
    setTimeout(hideLandingShell, 20000);
  </script>
</head>
<body>
  <div id="flutter-host"></div>

  <div id="landing-shell" aria-label="Aunty home">
    <div class="play-card">
      <div class="play-cta">
        <div class="play-pill">
          <span class="dot" aria-hidden="true"></span>
          Loading Game Engine…
        </div>
      </div>
    </div>

    <section class="highlights" aria-label="Offers and winners">
      <div class="cards">
        <article class="card offer" id="shell-offer-card">
          <div class="accent" aria-hidden="true"></div>
          <div class="body">
            <h3>Today's Special Offer</h3>
            <div class="offer-media" id="shell-offer-media">
              <div class="skel fill" aria-hidden="true"></div>
              <img id="shell-offer-img" alt="" decoding="sync" fetchpriority="high">
              <span class="media-badge">OFFER</span>
            </div>
            <p class="offer-desc" id="shell-offer-desc"></p>
            <div id="shell-offer-skels" aria-hidden="true">
              <div class="skel line"></div>
              <div class="skel line short"></div>
              <div class="skel line" style="width:28%;height:22px;margin-top:12px;border-radius:6px;"></div>
            </div>
            <div class="offer-price" id="shell-offer-price"></div>
          </div>
        </article>

        <article class="card winner" id="shell-winner-card">
          <div class="accent" aria-hidden="true"></div>
          <div class="body winner-body">
            <span class="badge winner">🏆 CHAMPION</span>
            <h3>Latest Winner</h3>
            <div class="winner-avatar" id="shell-winner-avatar" aria-hidden="true">
              <div class="skel circle"></div>
              <img id="shell-winner-img" alt="" decoding="sync" fetchpriority="high">
            </div>
            <div class="winner-skels" id="shell-winner-skels" aria-hidden="true">
              <div class="skel line" style="width:50%;"></div>
              <div class="skel line" style="width:35%;height:28px;margin-top:12px;border-radius:22px;"></div>
            </div>
            <p class="winner-name" id="shell-winner-name"></p>
            <div class="winner-score" id="shell-winner-score"></div>
          </div>
        </article>
      </div>
    </section>

    <div class="privacy">Privacy Policy</div>
  </div>

  <!-- Blocking: paint real cache into the shell before Flutter bootstrap. -->
  <script>
    (function () {
      if (typeof window.__auntyHydrateShell === 'function') {
        window.__auntyHydrateShell(window.__AUNTY_HP);
      }
    })();
  </script>

  <!--
    Firebase JS SDK 12.15.0 — matches firebase_core_web (supportedFirebaseJsSdkVersion).
    Modular modules are assigned to window.firebase_* so FlutterFire can use them
    without re-injecting, then Flutter bootstrap starts.
  -->
  <script>
    window.flutterfire_web_sdk_version = '12.15.0';
  </script>
  <script type="module">
    (async function () {
      var version = window.flutterfire_web_sdk_version || '12.15.0';
      var base = 'https://www.gstatic.com/firebasejs/' + version + '/';
      try {
        var modules = await Promise.all([
          import(base + 'firebase-app.js'),
          import(base + 'firebase-auth.js'),
          import(base + 'firebase-firestore-pipelines.js')
        ]);
        window.firebase_core = modules[0];
        window.firebase_auth = modules[1];
        window.firebase_firestore = modules[2];
        window.flutterfire_ignore_scripts = ['core', 'auth', 'firestore'];
        console.log('[Aunty] Firebase JS modules ready (' + version + ')');
      } catch (e) {
        console.warn('[Aunty] Firebase JS preload failed — FlutterFire will inject:', e);
      }
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
